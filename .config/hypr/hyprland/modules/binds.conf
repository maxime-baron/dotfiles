###################
### KEYBINDINGS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, RETURN, exec, "${TERMINAL}"
bind = $mainMod, C, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, thunar
bind = $mainMod, V, togglefloating,

bind = $mainMod, SPACE, exec, nc -U $XDG_RUNTIME_DIR/walker/walker.sock
bind = $mainMod, L, exec, hyprlock


bind = ALT, Tab, layoutmsg, cyclenext
bind = ALT SHIFT, Tab, layoutmsg, cycleprev

# --- WHISPER ---
# Press → Start voice recording
bind = SUPER, V, exec, parecord --file-format=wav --rate=16000 --channels=1 /tmp/voice.wav

# Release → kill parecord et launch whisper
bindr = SUPER, V, exec, sleep 1 && pkill parecord && ~/.local/bin/whisper-cli -m ~/.local/share/whisper/models/ggml-small.bin -l fr -nt -f /tmp/voice.wav -np | wtype -

# --- SCREEN CAPTURE ---
# Capture all screen
bind = , Print, exec, grim - | tee ~/Pictures/Screenshots/screenshot-$(date +%Y-%m-%d-%H%M%S).png | wl-copy
# Capture selection
bind = SHIFT, Print, exec, grim -g "$(slurp -w 0)" - | tee ~/Pictures/Screenshots/selection-$(date +%Y-%m-%d-%H%M%S).png | wl-copy
# Record all screen
bind = CTRL, Print, exec, wf-recorder --audio="mixeur.monitor" -f ~/Videos/Screen\ Recording/recording-$(date +%Y-%m-%d-%H%M%S).mp4
# Record selection
bind = CTRL SHIFT, Print, exec, wf-recorder -g "$(slurp -b 00000000)" -f ~/Videos/Screen\ Recording/selection-$(date +%Y-%m-%d-%H%M%S).mp4
# Cut recording
bind = ALT, Print, exec, killall -s SIGINT wf-recorder

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Move main window with mainMod + arrow keys
bind = $mainMod SHIFT, left, movewindoworgroup, l
bind = $mainMod SHIFT, right, movewindoworgroup, r
bind = $mainMod SHIFT, up, movewindoworgroup, u
bind = $mainMod SHIFT, down, movewindoworgroup, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, code:10, workspace, 1
bind = $mainMod, code:11, workspace, 2
bind = $mainMod, code:12, workspace, 3
bind = $mainMod, code:13, workspace, 4
bind = $mainMod, code:14, workspace, 5
bind = $mainMod, code:15, workspace, 6
bind = $mainMod, code:16, workspace, 7

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, code:10, movetoworkspace, 1
bind = $mainMod SHIFT, code:11, movetoworkspace, 2
bind = $mainMod SHIFT, code:12, movetoworkspace, 3
bind = $mainMod SHIFT, code:13, movetoworkspace, 4
bind = $mainMod SHIFT, code:14, movetoworkspace, 5
bind = $mainMod SHIFT, code:15, movetoworkspace, 6
bind = $mainMod SHIFT, code:16, movetoworkspace, 7

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous